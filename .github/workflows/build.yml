name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint & Test
    uses: ./.github/workflows/ci.yml

  docker:
    name: Build & Publish Docker Image
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/docker-publish.yml
    secrets:
      PAT: ${{ secrets.PAT }}
